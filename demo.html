<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cloudy Desk Pet | Demo Video</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            background: #0a1428;
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .video-container {
            width: 80%;
            max-width: 900px;
            border: 4px solid #90caf9;
            box-shadow: 0 0 20px rgba(144, 202, 249, 0.4);
            border-radius: 10px;
            background: #000;
        }
        video { width: 100%; display: block; }
        .back-btn {
            margin-top: 30px;
            font-family: 'Press Start 2P', cursive;
            color: #90caf9;
            text-decoration: none;
            font-size: 0.8rem;
            border: 2px solid #90caf9;
            padding: 10px 20px;
            transition: 0.3s;
        }
        .back-btn:hover { background: #90caf9; color: #0a1428; }
        h1 { font-family: 'Press Start 2P', cursive; font-size: 1rem; margin-bottom: 20px; color: #fff; }
    </style>
</head>
<body>
    <h1>DESK PET DEMO</h1>
    <div class="video-container">
        <video controls autoplay>
            <source src="deskdemo.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>
    <a href="index.html" class="back-btn">< BACK TO DASHBOARD</a>

</html>
